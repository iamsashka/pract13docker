name: Pipeline pract 13

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn ${{ env.MAVEN_CLI_OPTS }} clean compile
        env:
          MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn ${{ env.MAVEN_CLI_OPTS }} checkstyle:check || true
        env:
          MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-versio